<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Amber gradient: top-centre glow -->
    <radialGradient id="glow1" cx="50%" cy="0%" r="70%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <!-- Amber gradient: top-right accent -->
    <radialGradient id="glow2" cx="92%" cy="5%" r="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#b45309" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#b45309" stop-opacity="0"/>
    </radialGradient>
    <!-- Clip for content area -->
    <clipPath id="content-clip">
      <rect width="1200" height="630"/>
    </clipPath>
  </defs>

  <!-- Base: white background -->
  <rect width="1200" height="630" fill="#ffffff"/>

  <!-- Gradient overlays -->
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Large O letterform watermark (right side) — reusing the octane-o path -->
  <g clip-path="url(#content-clip)">
    <svg x="640" y="-30" width="680" height="724" viewBox="350 582 240 256" opacity="0.07">
      <g transform="translate(336,590)">
        <g fill="#f59e0b">
          <g transform="translate(1.973142,225.654816)">
            <path d="M 164.8125 -216.203125 C 180.476562 -216.203125 193.84375 -212.804688 204.90625 -206.015625 C 215.976562 -199.222656 224.332031 -190.082031 229.96875 -178.59375 C 235.613281 -167.101562 238.4375 -154.46875 238.4375 -140.6875 C 238.4375 -118.332031 232.117188 -95.820312 219.484375 -73.15625 C 206.847656 -50.5 190.238281 -31.859375 169.65625 -17.234375 C 149.082031 -2.609375 127.519531 4.703125 104.96875 4.703125 C 90.34375 4.703125 77.441406 1.46875 66.265625 -5 C 55.085938 -11.476562 46.46875 -20.515625 40.40625 -32.109375 C 34.351562 -43.703125 31.328125 -56.914062 31.328125 -71.75 C 31.328125 -93.0625 37.539062 -115.046875 49.96875 -137.703125 C 62.40625 -160.367188 78.910156 -179.117188 99.484375 -193.953125 C 120.054688 -208.785156 141.832031 -216.203125 164.8125 -216.203125 Z M 64.859375 -59.53125 C 64.859375 -45.539062 68.25 -33.113281 75.03125 -22.25 C 81.820312 -11.382812 92.320312 -5.953125 106.53125 -5.953125 C 125.75 -5.953125 142.820312 -14.410156 157.75 -31.328125 C 172.6875 -48.253906 184.28125 -68.253906 192.53125 -91.328125 C 200.789062 -114.410156 204.921875 -133.992188 204.921875 -150.078125 C 204.921875 -165.742188 201.421875 -178.90625 194.421875 -189.5625 C 187.421875 -200.21875 176.925781 -205.546875 162.9375 -205.546875 C 143.71875 -205.546875 126.691406 -197.082031 111.859375 -180.15625 C 97.023438 -163.238281 85.484375 -143.132812 77.234375 -119.84375 C 68.984375 -96.550781 64.859375 -76.445312 64.859375 -59.53125 Z"/>
          </g>
        </g>
      </g>
    </svg>
  </g>

  <!-- ── Left content ── -->

  <!-- Label -->
  <text
    x="80" y="188"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="13" font-weight="600" letter-spacing="0.12em"
    fill="#a1a1aa"
    text-anchor="start"
  >LIVE FUEL PRICES · SRI LANKA</text>

  <!-- Headline row 1 -->
  <text
    x="80" y="284"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="80" font-weight="800" letter-spacing="-0.04em"
    fill="#09090b"
  >Sri Lanka</text>

  <!-- Headline row 2 — amber accent word -->
  <text
    x="80" y="374"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="80" font-weight="800" letter-spacing="-0.04em"
    fill="#09090b"
  >fuel <tspan fill="#f59e0b">prices.</tspan></text>

  <!-- Subtitle -->
  <text
    x="80" y="428"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="22" font-weight="400"
    fill="#71717a"
  >History · World comparison · Trip calculator · Free API</text>

  <!-- Price chips row -->
  <!-- Petrol 92 chip -->
  <rect x="80" y="468" width="148" height="44" rx="10" fill="white" stroke="#e4e4e7" stroke-width="1.5"/>
  <text x="154" y="492" text-anchor="middle"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="11" font-weight="600" letter-spacing="0.05em" fill="#b45309">PETROL 92</text>
  <text x="154" y="505" text-anchor="middle"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="10" font-weight="400" fill="#71717a">LKR / litre</text>

  <!-- Auto Diesel chip -->
  <rect x="240" y="468" width="148" height="44" rx="10" fill="white" stroke="#e4e4e7" stroke-width="1.5"/>
  <text x="314" y="492" text-anchor="middle"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="11" font-weight="600" letter-spacing="0.05em" fill="#059669">AUTO DIESEL</text>
  <text x="314" y="505" text-anchor="middle"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="10" font-weight="400" fill="#71717a">LKR / litre</text>

  <!-- World comparison chip -->
  <rect x="400" y="468" width="168" height="44" rx="10" fill="white" stroke="#e4e4e7" stroke-width="1.5"/>
  <text x="484" y="492" text-anchor="middle"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="11" font-weight="600" letter-spacing="0.05em" fill="#6366f1">WORLD RANK</text>
  <text x="484" y="505" text-anchor="middle"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="10" font-weight="400" fill="#71717a">170+ countries</text>

  <!-- ── Bottom bar ── -->
  <!-- Separator line -->
  <line x1="80" y1="552" x2="1120" y2="552" stroke="#e4e4e7" stroke-width="1"/>

  <!-- "Octane" brand name bottom-left -->
  <text
    x="80" y="592"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="20" font-weight="800" letter-spacing="-0.04em"
    fill="#09090b"
  >Octane</text>

  <!-- URL -->
  <text
    x="80" y="614"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="14" font-weight="400"
    fill="#a1a1aa"
  >octane.lk</text>

  <!-- "Built by Ardeno Studio" -->
  <text
    x="1120" y="592"
    text-anchor="end"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="13" font-weight="400"
    fill="#a1a1aa"
  >Built by Ardeno Studio</text>

  <!-- Amber bottom accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="#f59e0b"/>
</svg>
