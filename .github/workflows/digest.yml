name: Send weekly fuel price digest

on:
  schedule:
    - cron: '0 3 * * 1'  # Every Monday 08:30 SL (03:00 UTC)
  workflow_dispatch:      # allow manual trigger

permissions:
  id-token: write
  contents: read

jobs:
  digest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::308324916290:role/octane-gh-actions-role
          aws-region: ap-southeast-1

      - name: Load DATABASE_URL from Secrets Manager
        run: |
          echo "DATABASE_URL=$(aws secretsmanager get-secret-value --secret-id octane/database-url --query SecretString --output text)" >> "$GITHUB_ENV"

      - name: Send weekly digest
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_FROM_EMAIL: ${{ secrets.ALERT_FROM_EMAIL }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: python -m app.scrapers.send_digest
