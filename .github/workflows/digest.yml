name: Send weekly fuel price digest

on:
  schedule:
    - cron: '0 3 * * 1'  # Every Monday 08:30 SL (03:00 UTC)
  workflow_dispatch:      # allow manual trigger

permissions:
  id-token: write
  contents: read

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::308324916290:role/octane-gh-actions-role
          aws-region: ap-southeast-1

      - name: Send weekly digest as a one-off ECS Fargate task
        # RDS lives in a private VPC — GitHub-hosted runners have no network
        # path to it, so this runs inside the VPC via ECS instead of
        # connecting directly from here.
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster octane-cluster \
            --task-definition octane-api \
            --launch-type FARGATE \
            --network-configuration '{"awsvpcConfiguration":{"subnets":["subnet-038a694302e48edb7","subnet-046fd76aaa9724283","subnet-0aee759a78dd27197"],"securityGroups":["sg-06a044139a36830e4"],"assignPublicIp":"ENABLED"}}' \
            --overrides '{"containerOverrides":[{"name":"octane-api","command":["python","-m","app.scrapers.send_digest"]}]}' \
            --query 'tasks[0].taskArn' --output text)
          echo "Task: $TASK_ARN"
          aws ecs wait tasks-stopped --cluster octane-cluster --tasks "$TASK_ARN"
          EXIT_CODE=$(aws ecs describe-tasks --cluster octane-cluster --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' --output text)
          echo "Exit code: $EXIT_CODE"
          [ "$EXIT_CODE" = "0" ]
