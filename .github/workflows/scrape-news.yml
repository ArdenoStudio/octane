name: Scrape news price signals

# Faster cadence than the full scrape pipeline. News often reports CPC
# revisions hours before ceypetco.gov.lk updates. Results are stored as
# source=news and shown as unconfirmed early signals in the app.
# When those signals change, refresh the AI revision outlook too.

on:
  schedule:
    # Every hour — catch revision-day wire stories quickly.
    - cron: '15 * * * *'
  workflow_dispatch:        # allow manual trigger on revision day

jobs:
  scrape-news:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write   # dispatch AI sentiment when early signals move
    defaults:
      run:
        working-directory: backend
    outputs:
      price_changed: ${{ steps.scrape.outputs.price_changed }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news scraper
        id: scrape
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m app.scrapers.run_news

      - name: Summarize
        if: always()
        run: echo "News scrape finished — check job logs for raw/selected/consensus counts."

      - name: Refresh AI revision outlook
        if: steps.scrape.outputs.price_changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: .
        run: |
          gh workflow run "AI Sentiment Analysis" \
            --ref "${{ github.ref_name }}" \
            -f reason=price_change
          echo "Dispatched AI Sentiment Analysis (price_change)"
