name: Scrape news price signals

# Faster cadence than the full scrape pipeline. News often reports CPC
# revisions hours before ceypetco.gov.lk updates. Results are stored as
# source=news and shown as unconfirmed early signals in the app.
# When those signals change, refresh the AI revision outlook too.

on:
  schedule:
    # Every hour — catch revision-day wire stories quickly.
    - cron: '15 * * * *'
  workflow_dispatch:        # allow manual trigger on revision day

permissions:
  id-token: write
  contents: read
  actions: write   # dispatch AI sentiment when early signals move

jobs:
  scrape-news:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::308324916290:role/octane-gh-actions-role
          aws-region: ap-southeast-1

      - name: Run news scraper as a one-off ECS Fargate task
        # RDS lives in a private VPC — GitHub-hosted runners have no network
        # path to it, so this runs inside the VPC via ECS instead of
        # connecting directly from here.
        id: scrape
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster octane-cluster \
            --task-definition octane-api \
            --launch-type FARGATE \
            --network-configuration '{"awsvpcConfiguration":{"subnets":["subnet-038a694302e48edb7","subnet-046fd76aaa9724283","subnet-0aee759a78dd27197"],"securityGroups":["sg-06a044139a36830e4"],"assignPublicIp":"ENABLED"}}' \
            --overrides '{"containerOverrides":[{"name":"octane-api","command":["python","-m","app.scrapers.run_news"]}]}' \
            --query 'tasks[0].taskArn' --output text)
          echo "Task: $TASK_ARN"
          aws ecs wait tasks-stopped --cluster octane-cluster --tasks "$TASK_ARN"
          EXIT_CODE=$(aws ecs describe-tasks --cluster octane-cluster --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' --output text)
          echo "Exit code: $EXIT_CODE"

          TASK_ID="${TASK_ARN##*/}"
          LOG_STREAM="ecs/octane-api/${TASK_ID}"
          PRICE_CHANGED=$(aws logs get-log-events \
            --log-group-name /ecs/octane-api \
            --log-stream-name "$LOG_STREAM" \
            --query 'events[*].message' --output text \
            | grep -o 'price_changed=[a-z]*' | tail -1 | cut -d= -f2 || echo "false")
          echo "price_changed=${PRICE_CHANGED:-false}" >> "$GITHUB_OUTPUT"

          [ "$EXIT_CODE" = "0" ]

      - name: Summarize
        if: always()
        run: echo "News scrape finished — check the ECS task's CloudWatch logs (/ecs/octane-api) for raw/selected/consensus counts."

      - name: Refresh AI revision outlook
        if: steps.scrape.outputs.price_changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run "AI Sentiment Analysis" \
            --ref "${{ github.ref_name }}" \
            -f reason=price_change
          echo "Dispatched AI Sentiment Analysis (price_change)"
