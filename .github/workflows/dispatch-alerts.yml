name: Dispatch price alerts

on:
  schedule:
    - cron: "0 * * * *"  # every hour
  workflow_dispatch:      # allow manual trigger

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger alert dispatch
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST https://d2w9pgvodb18rj.cloudfront.net/v1/alerts/dispatch \
            -H "x-dispatch-secret: ${{ secrets.DISPATCH_SECRET }}")
          echo "$RESPONSE"
          STATUS=$(echo "$RESPONSE" | tail -1)
          [ "$STATUS" = "200" ]
