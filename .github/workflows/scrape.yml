name: Scrape fuel prices

on:
  schedule:
    - cron: '30 2 * * *'   # 08:00 SL — morning baseline
    - cron: '30 6 * * *'   # 12:00 SL — midday
    - cron: '30 10 * * *'  # 16:00 SL — afternoon
    - cron: '30 14 * * *'  # 20:00 SL — evening
    - cron: '30 18 * * *'  # 00:00 SL — midnight (CPC revises at midnight)
  workflow_dispatch:        # allow manual trigger

permissions:
  id-token: write
  contents: read

jobs:
  scrape:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::308324916290:role/octane-gh-actions-role
          aws-region: ap-southeast-1

      - name: Load DATABASE_URL from Secrets Manager
        run: |
          echo "DATABASE_URL=$(aws secretsmanager get-secret-value --secret-id octane/database-url --query SecretString --output text)" >> "$GITHUB_ENV"

      - name: Run scrapers
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: python -m app.scrapers.run
