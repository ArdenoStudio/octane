name: Scrape fuel prices

on:
  schedule:
    - cron: '30 2 * * *'   # 08:00 Sri Lanka time (UTC+5:30) — morning baseline
    - cron: '0 12 * * *'   # 17:30 Sri Lanka time — catches evening announcements
    - cron: '0 15 * * *'   # 20:30 Sri Lanka time — catches late-night revisions
  workflow_dispatch:        # allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scrapers
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m app.scrapers.run
