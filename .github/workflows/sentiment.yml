name: AI Sentiment Analysis

on:
  schedule:
    # 02:00 UTC = 07:30 SL time — runs after major overnight news cycles
    - cron: '0 2 * * *'
  workflow_dispatch:  # allow manual trigger for testing / scrape-driven refresh
    inputs:
      reason:
        description: "Why this run was triggered (scheduled | manual | price_change)"
        required: false
        default: manual
        type: string

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to commit backend/data/ai_sentiment.json

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install httpx groq

      - name: Run sentiment analysis
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SENTIMENT_REASON: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.reason || 'scheduled' }}
        run: |
          REASON="${SENTIMENT_REASON:-scheduled}"
          if [ "$REASON" = "price_change" ]; then
            export SENTIMENT_SKIP_IF_FRESH_MINUTES=60
          else
            export SENTIMENT_SKIP_IF_FRESH_MINUTES=0
          fi
          echo "SENTIMENT_REASON=$REASON SKIP=$SENTIMENT_SKIP_IF_FRESH_MINUTES"
          python scripts/sentiment_analysis.py

      - name: Commit updated sentiment data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/data/ai_sentiment.json
          git diff --staged --quiet && echo "No changes to commit" || (
            git commit -m "chore: update AI fuel sentiment" &&
            git push
          )
