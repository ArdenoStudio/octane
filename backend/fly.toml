# fly.toml — Octane API (see https://fly.io/docs/reference/configuration/)
#
# Do not define BOTH [http_service] and [[services]] for the same internal_port;
# duplicate definitions cause flyctl deploy validation/runtime failures.

app = "octane-api"
primary_region = "sin"

[build]

[env]
  # Comma-separated; merged with cors_origin_regex in app for previews (*.vercel.app).
  CORS_ORIGINS = "https://octane.lk,https://octane-smoky.vercel.app,http://localhost:5173"
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  # Keep at least one Machine warm in sin — min_machines_running=0 meant both could stop,
  # so browsers hit long cold-start / gateway timeouts ("Failed to fetch").
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    interval = "15s"
    timeout = "10s"
    grace_period = "60s"
    method = "GET"
    path = "/"

[[vm]]
  cpus = 1
  cpu_kind = "shared"
  memory = "512mb"

# Default deploy wait (~5m) was too tight when Machines API probes lag or cold starts spike.
[deploy]
  wait_timeout = "15m"
